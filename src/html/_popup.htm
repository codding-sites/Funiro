<div id="subscribe" aria-hidden="true" class="popup subscribe">
	<div class="popup__wrapper">
		<div class="popup__content">
			<div class="subscribe__body">
				<div class="subscribe__icon">
					<img src="@img/popup/success.svg" alt="Icon Success">
				</div>
				<div class="subscribe__content">
					<h3 class="subscribe__title">Your message was sent</h3>
					<div class="subscribe__text">
						<p>We will e-mail you when PlugSpot is available for download. Thank you!</p>
					</div>
				</div>
				<button data-close type="button" class="subscribe__close">Close</button>
			</div>
		</div>
	</div>
</div>

<div id="cart-popup" aria-hidden="true" class="popup cart-popup">
	<div class="popup__wrapper">
		<div class="popup__content">
			<div class="cart-popup__body">
				<button data-close type="button" class="cart-popup__close">X</button>
				<div class="cart-popup__title-text">
					<h2 class="cart-popup__title">You successfully made test order</h2>
					<h3 class="cart-popup__sub-title">You order contains</h3>
				</div>
				<div class="cart-popup__order-tittles ordered-product-tittle">
					<div class="ordered-product-tittle__name">Product</div>
					<div class="ordered-product-tittle__price">Price</div>
					<div class="ordered-product-tittle__quantity">Quantity</div>
					<div class="ordered-product-tittle__total">Total</div>
				</div>
				<div class="cart-popup__table ordered-table-popup"></div>
				<button data-popup="#order" class="cart-popup__button button">OK</button>
			</div>
		</div>
	</div>
</div>

<div id="order" aria-hidden="true" class="popup subscribe">
	<div class="popup__wrapper">
		<div class="popup__content">
			<div class="subscribe__body">
				<div class="subscribe__icon">
					<img src="@img/popup/success.svg" alt="Icon Success">
				</div>
				<div class="subscribe__content">
					<h3 class="subscribe__title">Your order has been successfully received</h3>
					<div class="subscribe__text">
						<p>You can close this window</p>
					</div>
				</div>
				<button data-close type="button" class="subscribe__close">Close</button>
			</div>
		</div>
	</div>
</div>
